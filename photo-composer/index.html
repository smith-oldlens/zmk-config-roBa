<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scene Composer — 風景に人物を合成</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="topbar">
  <h1>Scene Composer</h1>
  <span class="spacer"></span>
  <button id="undoBtn" class="icon-btn" title="元に戻す" disabled>↩</button>
  <button id="settingsBtn" class="icon-btn" title="設定">⚙</button>
</header>

<main id="stageWrap">
  <div id="emptyState">
    <p>風景写真を選んで、<br>好きな場所に人物を合成しましょう</p>
    <button id="pickBgBtn" class="primary">写真を選ぶ</button>
    <p class="hint-text">ここに画像をドラッグ＆ドロップでもOK</p>
  </div>
  <canvas id="stage" hidden></canvas>
  <div id="placementHint" hidden>写真をタップして人物を配置</div>
</main>

<footer id="toolbar" hidden>
  <button id="genBtn">✨<span>人物を生成</span></button>
  <button id="libBtn">👤<span>ライブラリ</span></button>
  <button id="changeBgBtn">🖼<span>写真</span></button>
  <button id="exportBtn">⬇<span>保存</span></button>
</footer>

<input type="file" id="bgInput" accept="image/*" hidden>

<!-- 選択レイヤーの調整パネル -->
<div id="adjustSheet" class="sheet" hidden>
  <div class="sheet-handle"></div>
  <label>大きさ
    <input type="range" id="sizeSlider" step="0.005">
  </label>
  <label>色なじみ
    <input type="range" id="matchSlider" min="0" max="1" step="0.05">
  </label>
  <label>影の濃さ
    <input type="range" id="shadowOpacitySlider" min="0" max="1" step="0.05">
  </label>
  <label>影のぼかし
    <input type="range" id="shadowBlurSlider" min="0" max="1" step="0.05">
  </label>
  <label>影の向き
    <input type="range" id="shadowDirSlider" min="-1" max="1" step="0.05">
  </label>
  <div class="sheet-actions">
    <button id="flipBtn">⇄ 反転</button>
    <button id="deleteBtn" class="danger">🗑 削除</button>
    <button id="closeAdjustBtn">完了</button>
  </div>
</div>

<!-- 人物生成モーダル -->
<div id="genModal" class="modal" hidden>
  <div class="modal-box">
    <h2>人物を生成</h2>
    <div id="presetChips" class="chips"></div>
    <textarea id="promptInput" rows="3"
      placeholder="例：白いワンピースの女の子が立っている後ろ姿"></textarea>
    <button id="runGenBtn" class="primary">✨ 生成する</button>
    <p id="genStatus" class="status" hidden></p>

    <div id="genResult" hidden>
      <div class="preview-wrap checker">
        <canvas id="genPreview"></canvas>
      </div>
      <details id="keyTools">
        <summary>切り抜きの調整（うまく抜けないとき）</summary>
        <label>抜き具合
          <input type="range" id="keyToleranceSlider" min="10" max="120" step="2" value="60">
        </label>
        <button id="eyedropperBtn">🖊 背景色を選び直す</button>
        <p class="hint-text" id="eyedropHint" hidden>元画像の背景部分をタップしてください</p>
        <div class="preview-wrap" id="rawWrap" hidden>
          <canvas id="rawPreview"></canvas>
        </div>
      </details>
      <div class="modal-actions">
        <button id="placeGenBtn" class="primary">この人物を配置</button>
        <button id="discardGenBtn">破棄</button>
      </div>
    </div>
    <button class="modal-close" data-close="genModal">×</button>
  </div>
</div>

<!-- 人物ライブラリ -->
<div id="libModal" class="modal" hidden>
  <div class="modal-box">
    <h2>人物ライブラリ</h2>
    <p class="hint-text">生成した人物はここに保存され、何度でも使えます</p>
    <div id="libGrid" class="lib-grid"></div>
    <p id="libEmpty" class="hint-text">まだ人物がいません。「人物を生成」から作ってみましょう。</p>
    <button class="modal-close" data-close="libModal">×</button>
  </div>
</div>

<!-- 設定 -->
<div id="settingsModal" class="modal" hidden>
  <div class="modal-box">
    <h2>設定</h2>
    <label class="field">画像生成サービス
      <select id="providerSelect"></select>
    </label>
    <label class="field" id="apiKeyLabel">APIキー
      <input type="password" id="apiKeyInput" placeholder="">
    </label>
    <p class="hint-text" id="keyHelp"></p>
    <p class="hint-text">
      キーはこの端末（ブラウザ）内にのみ保存され、選んだサービスの API への送信以外には使われません。
    </p>
    <div class="modal-actions">
      <button id="saveKeyBtn" class="primary">保存</button>
      <button id="clearKeyBtn">キーを削除</button>
    </div>
    <button class="modal-close" data-close="settingsModal">×</button>
  </div>
</div>

<!-- 書き出し -->
<div id="exportModal" class="modal" hidden>
  <div class="modal-box">
    <h2>書き出し</h2>
    <p class="hint-text">元の写真と同じ解像度で保存します</p>
    <div class="modal-actions">
      <button id="exportJpegBtn" class="primary">JPEGで保存</button>
      <button id="exportPngBtn">PNGで保存</button>
      <button id="shareBtn" hidden>共有…</button>
    </div>
    <p id="exportStatus" class="status" hidden></p>
    <button class="modal-close" data-close="exportModal">×</button>
  </div>
</div>

<div id="toast" hidden></div>

<script type="module" src="app.js"></script>
</body>
</html>
