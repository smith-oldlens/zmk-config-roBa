name: Build AdBlock APK

on:
  push:
    paths:
      - "android-adblock/**"
      - ".github/workflows/android-adblock.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: android-adblock
        run: gradle --no-daemon :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: roba-adblock-debug-apk
          path: android-adblock/app/build/outputs/apk/debug/app-debug.apk
